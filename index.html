<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Forgotten Town</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  padding:0;
  background:#222;
  overflow:hidden;
  touch-action:none;
}
canvas{display:block;}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  font-size:18px;
}

#actionBtn{
  position:fixed;
  bottom:140px;
  right:20px;
  padding:12px;
  font-size:18px;
  display:none;
}

#joystick{
  position:fixed;
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  display:none;
}
#stick{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(255,255,255,0.4);
  left:30px;
  top:30px;
}
</style>
</head>
<body>

<div id="ui">
🪵 <span id="woodCount">0</span><br>
🪓 <span id="axeState">No</span>
</div>

<canvas id="game"></canvas>
<div id="joystick"><div id="stick"></div></div>
<button id="actionBtn">Acción</button>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

/* CONFIG */
const SIZE=60;
const SPEED=2; // 🔥 MÁS LENTO

const WORLD_W=2000;
const WORLD_H=2000;

/* PLAYER */
let player={
  x:WORLD_W/2,
  y:WORLD_H/2
};

/* CAMERA */
let cam={x:0,y:0};

/* INVENTARIO */
let inventory={wood:0,axe:false};
const woodUI=document.getElementById("woodCount");
const axeUI=document.getElementById("axeState");

/* NPC */
let npcs=[
  {x:300,y:300},
  {x:500,y:400}
];

/* Hacha */
let axeWorld={x:600,y:500,picked:false};

/* Árboles */
let trees=[];
for(let i=0;i<15;i++){
  trees.push({
    x:Math.random()*WORLD_W,
    y:Math.random()*WORLD_H,
    hp:3
  });
}

/* JOYSTICK */
const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");

let joyActive=false;
let moveX=0,moveY=0;
let joyX=0,joyY=0;

canvas.addEventListener("touchstart",e=>{
  const t=e.touches[0];
  joyActive=true;
  joystick.style.display="block";
  joystick.style.left=(t.clientX-60)+"px";
  joystick.style.top=(t.clientY-60)+"px";
  joyX=t.clientX;
  joyY=t.clientY;
});

canvas.addEventListener("touchmove",e=>{
  if(!joyActive)return;
  const t=e.touches[0];

  let dx=t.clientX-joyX;
  let dy=t.clientY-joyY;

  const max=40;
  const dist=Math.sqrt(dx*dx+dy*dy);

  if(dist>max){
    dx=dx/dist*max;
    dy=dy/dist*max;
  }

  stick.style.left=(dx+30)+"px";
  stick.style.top=(dy+30)+"px";

  moveX=dx/max;
  moveY=dy/max;
});

canvas.addEventListener("touchend",()=>{
  joyActive=false;
  joystick.style.display="none";
  stick.style.left="30px";
  stick.style.top="30px";
  moveX=0;
  moveY=0;
});

/* BOTÓN */
const actionBtn=document.getElementById("actionBtn");
let actionType=null;

actionBtn.onclick=()=>{
  if(actionType==="pick"){
    inventory.axe=true;
    axeWorld.picked=true;
    axeUI.innerText="Sí";
  }

  if(actionType==="chop"){
    trees.forEach(t=>{
      if(Math.hypot(player.x-t.x,player.y-t.y)<100){
        t.hp--;
        if(t.hp<=0){
          inventory.wood++;
          woodUI.innerText=inventory.wood;
        }
      }
    });
    trees=trees.filter(t=>t.hp>0);
  }
};

/* UPDATE */
function update(){

  /* MOVIMIENTO */
  player.x+=moveX*SPEED;
  player.y+=moveY*SPEED;

  /* LIMITES */
  player.x=Math.max(0,Math.min(WORLD_W,player.x));
  player.y=Math.max(0,Math.min(WORLD_H,player.y));

  /* CAMARA */
  cam.x=player.x-canvas.width/2;
  cam.y=player.y-canvas.height/2;

  /* INTERACCION */
  actionType=null;

  if(!inventory.axe && !axeWorld.picked){
    if(Math.hypot(player.x-axeWorld.x,player.y-axeWorld.y)<100){
      actionType="pick";
    }
  }

  if(inventory.axe){
    trees.forEach(t=>{
      if(Math.hypot(player.x-t.x,player.y-t.y)<100){
        actionType="chop";
      }
    });
  }

  actionBtn.style.display=actionType?"block":"none";
  actionBtn.innerText=actionType==="pick"?"Recoger":"Golpear";

  draw();
  requestAnimationFrame(update);
}

/* DRAW */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* MAPA */
  ctx.fillStyle="#4caf50";
  ctx.fillRect(-cam.x,-cam.y,WORLD_W,WORLD_H);

  /* ÁRBOLES */
  trees.forEach(t=>{
    ctx.fillStyle="green";
    ctx.fillRect(t.x-cam.x,t.y-cam.y,40,40);
  });

  /* HACHA */
  if(!axeWorld.picked){
    ctx.fillStyle="red";
    ctx.fillRect(axeWorld.x-cam.x,axeWorld.y-cam.y,20,20);
  }

  /* NPC */
  npcs.forEach(n=>{
    ctx.fillStyle="blue";
    ctx.fillRect(n.x-cam.x,n.y-cam.y,40,40);
  });

  /* PLAYER */
  ctx.fillStyle="white";
  ctx.fillRect(player.x-cam.x,player.y-cam.y,50,50);
}

/* START */
setTimeout(()=>{
  requestAnimationFrame(update);
},500);
</script>

</body>
</html>
