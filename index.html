<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Forgotten Town</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
html,body{
  margin:0;
  padding:0;
  background:#222;
  overflow:hidden;
  touch-action:none;
}
canvas{display:block;}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  font-size:18px;
  z-index:50;
}

#actionBtn{
  position:fixed;
  bottom:140px;
  right:20px;
  padding:12px 18px;
  font-size:18px;
  display:none;
  z-index:30;
}

/* JOYSTICK */
#joystick{
  position:fixed;
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:none;
  z-index:20;
}
#stick{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  left:30px;
  top:30px;
}
</style>
</head>
<body>

<div id="ui">
Inventario:<br>
🪵 Madera: <span id="woodCount">0</span><br>
🪓 Hacha: <span id="axeState">No</span>
</div>

<canvas id="game"></canvas>
<div id="joystick"><div id="stick"></div></div>
<button id="actionBtn">Acción</button>

<script>

/* ===== CANVAS ===== */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* ===== CONFIG ===== */
const SIZE=128;
const SPEED=4;
const WALK_DELAY=4;
const WORLD_W=3000;
const WORLD_H=3000;

/* ===== ZOOM ===== */
let zoom=1;
const MIN_ZOOM=0.5;
const MAX_ZOOM=2;

canvas.addEventListener("wheel",e=>{
  e.preventDefault();
  zoom+=e.deltaY*-0.001;
  zoom=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,zoom));
});

/* ===== CÁMARA ===== */
let camera={x:0,y:0};

/* ===== INVENTARIO ===== */
let inventory={wood:0,axe:false};
const woodUI=document.getElementById("woodCount");
const axeUI=document.getElementById("axeState");

/* ===== JUGADOR ===== */
let pony={
  x:WORLD_W/2,
  y:WORLD_H/2,
  frame:0,
  tick:0,
  moving:false,
  facing:"right"
};

/* ===== MAPA ===== */
let mapObjects=[
  {x:pony.x+150,y:pony.y+80,type:"axe"},
  {x:500,y:500,type:"tree",hp:4},
  {x:700,y:600,type:"tree",hp:4},
  {x:900,y:400,type:"tree",hp:4}
];

/* ===== BOTÓN ===== */
let actionType=null;
const actionBtn=document.getElementById("actionBtn");

actionBtn.onclick=()=>{

  mapObjects.forEach(obj=>{

    if(obj.target){

      if(obj.type==="axe"){
        inventory.axe=true;
        axeUI.innerText="Sí";
        obj.remove=true;
      }

      if(obj.type==="tree"){
        obj.hp--;
        if(obj.hp<=0){
          inventory.wood++;
          woodUI.innerText=inventory.wood;
          obj.remove=true;
        }
      }

    }

  });

  mapObjects=mapObjects.filter(o=>!o.remove);
};

/* ===== IMÁGENES ===== */
let imagesToLoad=0,imagesLoaded=0;
function onLoad(){
  imagesLoaded++;
  if(imagesLoaded===imagesToLoad){
    requestAnimationFrame(update);
  }
}

const walkFrames=[];
for(let i=0;i<=15;i++){
  imagesToLoad++;
  const img=new Image();
  img.onload=onLoad;
  img.src=`sprites/caminar/caminar_${i}.png`;
  walkFrames.push(img);
}

const idleFrames=[];
for(let i=0;i<=3;i++){
  imagesToLoad++;
  const img=new Image();
  img.onload=onLoad;
  img.src=`sprites/idle/idle_${i}.png`;
  idleFrames.push(img);
}

/* ===== JOYSTICK ===== */
const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");
let joyActive=false,joyX=0,joyY=0;
let moveX=0,moveY=0;

canvas.addEventListener("touchstart",e=>{
  if(e.touches.length>1)return;
  const t=e.touches[0];
  joyActive=true;
  joystick.style.display="block";
  joystick.style.left=(t.clientX-60)+"px";
  joystick.style.top=(t.clientY-60)+"px";
  joyX=t.clientX; joyY=t.clientY;
});

canvas.addEventListener("touchmove",e=>{
  if(!joyActive||e.touches.length>1)return;
  const t=e.touches[0];
  let dx=t.clientX-joyX;
  let dy=t.clientY-joyY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const max=40;
  if(dist>max){
    dx=dx/dist*max;
    dy=dy/dist*max;
  }
  stick.style.left=(dx+30)+"px";
  stick.style.top=(dy+30)+"px";
  moveX=dx/max;
  moveY=dy/max;
});

canvas.addEventListener("touchend",()=>{
  joyActive=false;
  joystick.style.display="none";
  stick.style.left="30px";
  stick.style.top="30px";
  moveX=0; moveY=0;
});

/* ===== HACHA ===== */
function drawAxe(x,y,rotation=0){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rotation);

  ctx.fillStyle="#8b5a2b";
  ctx.fillRect(-3,0,6,30);

  ctx.fillStyle="#c62828";
  ctx.fillRect(-18,-18,36,18);

  ctx.fillStyle="#ff5252";
  ctx.fillRect(-10,-14,16,6);

  ctx.restore();
}

/* ===== UPDATE ===== */
function update(){

  pony.moving=false;

  if(moveX||moveY){
    pony.x+=moveX*SPEED;
    pony.y+=moveY*SPEED;
    pony.moving=true;
    if(moveX>0)pony.facing="right";
    if(moveX<0)pony.facing="left";
  }

  camera.x=pony.x-(canvas.width/(2*zoom))+SIZE/2;
  camera.y=pony.y-(canvas.height/(2*zoom))+SIZE/2;

  /* ANIMACIÓN */
  if(pony.moving){
    pony.tick++;
    if(pony.tick>=WALK_DELAY){
      pony.frame=(pony.frame+1)%walkFrames.length;
      pony.tick=0;
    }
  }else pony.frame=0;

  /* PROXIMIDAD */
  actionType=null;

  mapObjects.forEach(obj=>{
    const dist=Math.hypot(pony.x-obj.x,pony.y-obj.y);

    if(obj.type==="axe" && dist<120 && !inventory.axe){
      actionType="pick";
      obj.target=true;
    }

    if(obj.type==="tree" && dist<140 && inventory.axe){
      actionType="chop";
      obj.target=true;
    }else{
      obj.target=false;
    }
  });

  actionBtn.style.display=actionType?"block":"none";
  actionBtn.innerText=actionType==="pick"?"Recoger":"Golpear";

  draw();
  requestAnimationFrame(update);
}

/* ===== DRAW ===== */
function draw(){
  ctx.setTransform(zoom,0,0,zoom,0,0);
  ctx.clearRect(0,0,canvas.width/zoom,canvas.height/zoom);

  ctx.fillStyle="#4caf50";
  ctx.fillRect(0-camera.x,0-camera.y,WORLD_W,WORLD_H);

  /* MAPA */
  mapObjects.forEach(obj=>{
    const x=obj.x-camera.x;
    const y=obj.y-camera.y;

    if(obj.type==="tree"){
      ctx.fillStyle="#5a3a1a";
      ctx.fillRect(x+20,y+60,20,40);
      ctx.fillStyle=obj.target?"#2e7d32":"#388e3c";
      ctx.beginPath();
      ctx.arc(x+30,y+50,40,0,Math.PI*2);
      ctx.fill();
    }

    if(obj.type==="axe"){
      drawAxe(x,y+20,0);
    }
  });

  /* JUGADOR */
  const px=pony.x-camera.x;
  const py=pony.y-camera.y;

  let img=pony.moving?walkFrames[pony.frame]:idleFrames[0];

  ctx.save();
  if(pony.facing==="left"){
    ctx.translate(px+SIZE,py);
    ctx.scale(-1,1);
    ctx.drawImage(img,0,0,SIZE,SIZE);
  }else{
    ctx.drawImage(img,px,py,SIZE,SIZE);
  }
  ctx.restore();

  /* HACHA EN BOCA */
  if(inventory.axe){
    const mouthX=pony.facing==="right"?px+88:px+40;
    const mouthY=py+54;

    ctx.save();
    if(pony.facing==="right"){
      drawAxe(mouthX,mouthY,1.5708);
    }else{
      ctx.scale(-1,1);
      drawAxe(-mouthX,mouthY,1.5708);
    }
    ctx.restore();
  }

  ctx.setTransform(1,0,0,1,0,0);
}

</script>
</body>
</html>
